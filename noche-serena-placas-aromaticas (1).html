<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Especialización en Placas Aromáticas · Noche Serena</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cormorant+Garamond:wght@400;600&family=Josefin+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#c9a84c;--gold2:#f0d080;--gold3:#a0722a;
  --bg:#0a0510;--bg2:#1a0e2e;
  --cream:#f5edd6;--soft:#c8b98a;
  --green:#3ddc68;--red:#ff4d4d;
}
body{background:var(--bg);color:var(--cream);font-family:'Cormorant Garamond',serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(59,26,94,0.4) 0%,transparent 70%);pointer-events:none;z-index:0}
header{position:relative;z-index:2;text-align:center;padding:28px 16px 20px;border-bottom:1px solid rgba(201,168,76,0.2)}
.moon{font-size:40px;display:block;margin-bottom:10px}
header h1{font-family:'Playfair Display',serif;font-size:clamp(20px,4.5vw,30px);font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--soft);margin-top:5px}
.progress-wrap{position:relative;z-index:2;padding:18px 20px 0;max-width:680px;margin:0 auto}
.prog-top{display:flex;justify-content:space-between;margin-bottom:6px}
.prog-label{font-family:'Josefin Sans',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:.8}
.prog-count{font-family:'Josefin Sans',sans-serif;font-size:11px;color:var(--soft)}
.prog-bar{height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold3),var(--gold2));border-radius:99px;transition:width .6s ease;width:0%}
.dots{display:flex;gap:7px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.dot{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(201,168,76,.25);display:flex;align-items:center;justify-content:center;font-family:'Josefin Sans',sans-serif;font-size:10px;font-weight:700;color:var(--soft);cursor:pointer;transition:all .25s}
.dot.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.12)}
.dot.done{border-color:var(--green);color:var(--green);background:rgba(61,220,104,.08)}
main{position:relative;z-index:2;max-width:680px;margin:18px auto 40px;padding:0 14px}
.card{background:linear-gradient(145deg,rgba(26,14,46,.97),rgba(15,8,30,.98));border:1px solid rgba(201,168,76,.18);border-radius:18px;overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.65);animation:fadeUp .45s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.c-head{padding:22px 22px 16px;border-bottom:1px solid rgba(201,168,76,.1);display:flex;gap:14px;align-items:flex-start}
.c-num{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold3),var(--gold));display:flex;align-items:center;justify-content:center;font-family:'Josefin Sans',sans-serif;font-weight:700;font-size:15px;color:#0a0510;box-shadow:0 4px 14px rgba(201,168,76,.4)}
.c-tag{font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:3px}
.c-title{font-family:'Playfair Display',serif;font-size:clamp(17px,3.8vw,24px);font-weight:700;color:var(--cream);line-height:1.2}
.c-body{padding:20px 22px}
.illus{width:100%;height:130px;border-radius:10px;background:linear-gradient(135deg,rgba(59,26,94,.6),rgba(10,5,16,.8));display:flex;align-items:center;justify-content:center;font-size:58px;margin-bottom:16px}
.desc{font-size:clamp(14px,2.5vw,16px);line-height:1.8;color:var(--soft);margin-bottom:18px}
.desc strong{color:var(--cream)}
.mat-box{background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.14);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.box-title{font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;opacity:.85}
.mat-row{display:flex;align-items:center;gap:9px;padding:5px 0;border-bottom:1px solid rgba(201,168,76,.07);font-size:13px;color:var(--cream)}
.mat-row:last-child{border-bottom:none}
.mat-icon{width:24px;text-align:center;font-size:16px}
.mat-qty{margin-left:auto;font-family:'Josefin Sans',sans-serif;font-size:10px;color:var(--gold);background:rgba(201,168,76,.1);padding:2px 7px;border-radius:20px}
.inst-box{margin-bottom:16px}
.inst-row{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.inst-row:last-child{border-bottom:none}
.inst-n{flex-shrink:0;width:22px;height:22px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-family:'Josefin Sans',sans-serif;font-size:9px;font-weight:700;color:var(--gold);margin-top:3px}
.inst-t{font-size:14px;line-height:1.7;color:var(--soft)}
.inst-t strong{color:var(--cream)}
.tip{background:rgba(61,220,104,.07);border:1px solid rgba(61,220,104,.2);border-radius:9px;padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;font-size:13px;line-height:1.6;color:#a8f0be}
.warn{background:rgba(255,77,77,.07);border:1px solid rgba(255,77,77,.2);border-radius:9px;padding:12px 14px;margin-bottom:12px;display:flex;gap:10px;font-size:13px;line-height:1.6;color:#ffaaaa}
.tip-icon,.warn-icon{font-size:18px;flex-shrink:0}
.nav{display:flex;gap:10px;padding:16px 22px 22px;border-top:1px solid rgba(201,168,76,.08)}
.btn-back{flex:1;padding:13px;border-radius:40px;border:1px solid rgba(201,168,76,.3);background:transparent;color:var(--soft);font-family:'Josefin Sans',sans-serif;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-back:hover{border-color:var(--gold);color:var(--gold)}
.btn-next{flex:2;padding:13px;border-radius:40px;border:none;background:linear-gradient(135deg,var(--gold3),var(--gold));color:#0a0510;font-family:'Josefin Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .25s;box-shadow:0 4px 18px rgba(201,168,76,.35)}
.btn-next:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(201,168,76,.5)}
.qprog{padding:10px 22px 0;font-family:'Josefin Sans',sans-serif;font-size:10px;color:var(--soft);letter-spacing:1px}
.qtext{font-family:'Playfair Display',serif;font-size:clamp(16px,3.5vw,21px);color:var(--cream);padding:18px 22px 14px;line-height:1.5}
.qopts{padding:0 22px;display:flex;flex-direction:column;gap:9px;margin-bottom:16px}
.qopt{padding:13px 16px;border-radius:11px;border:1px solid rgba(201,168,76,.2);background:rgba(201,168,76,.04);cursor:pointer;font-size:14px;color:var(--cream);transition:all .2s;text-align:left;font-family:'Cormorant Garamond',serif}
.qopt:hover:not(.disabled){border-color:rgba(201,168,76,.5);background:rgba(201,168,76,.1)}
.qopt.correct{border-color:var(--green);background:rgba(61,220,104,.12);color:#a8f0be}
.qopt.wrong{border-color:var(--red);background:rgba(255,77,77,.1);color:#ffaaaa}
.qopt.disabled{cursor:not-allowed}
.qfb{margin:0 22px 14px;padding:12px 14px;border-radius:9px;font-size:13px;line-height:1.6;display:none}
.qfb.ok{display:block;background:rgba(61,220,104,.08);border:1px solid rgba(61,220,104,.2);color:#a8f0be}
.qfb.ko{display:block;background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.2);color:#ffaaaa}
.final{text-align:center;padding:36px 22px}
.final-em{font-size:64px;display:block;margin-bottom:16px}
.final h2{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,30px);font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.final p{font-size:15px;color:var(--soft);line-height:1.7;max-width:480px;margin:0 auto 18px}
.score{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:40px;border:1px solid var(--gold);background:rgba(201,168,76,.08);font-family:'Josefin Sans',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;color:var(--gold);margin-bottom:20px}
.btn-restart{padding:13px 28px;border-radius:40px;border:none;background:linear-gradient(135deg,#3b1a5e,#6c3483);color:var(--cream);font-family:'Josefin Sans',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .25s}
.btn-restart:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(108,52,131,.5)}
footer{position:relative;z-index:2;text-align:center;padding:16px;font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:rgba(201,168,76,.35)}
</style>
</head>
<body>
<header>
  <span class="moon">🌙</span>
  <h1>Especialización en Placas Aromáticas</h1>
  <p>Noche Serena · Guía paso a paso</p>
</header>
<div class="progress-wrap">
  <div class="prog-top">
    <span class="prog-label">Tu progreso</span>
    <span class="prog-count" id="progCount">Paso 1 de 7</span>
  </div>
  <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
  <div class="dots" id="dots"></div>
</div>
<main><div class="card" id="card"></div></main>
<footer>nocheserena.com · Con amor desde Uruguay 🌿</footer>
<script>
var steps=[{tag:"Módulo 01",title:"Materiales que vas a necesitar",emoji:"🧺",desc:"Antes de empezar, reuní todo lo que necesitás. Con estos materiales podés hacer <strong>10 placas aromáticas perfectas</strong> desde el primer intento.",materials:[{icon:"🕯️",name:"Cera de soja (alto punto de fusión 52-58°C)",qty:"500g"},{icon:"🌸",name:"Esencia o fragancia concentrada para velas",qty:"40-60ml"},{icon:"💜",name:"Flores secas (lavanda, rosas, gypsophila)",qty:"Al gusto"},{icon:"🔲",name:"Molde de silicona ovalado o rectangular",qty:"1 unidad"},{icon:"🫙",name:"Jarra de acero inoxidable para derretir",qty:"1 unidad"},{icon:"🌡️",name:"Termómetro de cocina",qty:"1 unidad"},{icon:"🪢",name:"Cordón de yute o cinta para colgar",qty:"10 trozos"},{icon:"⚖️",name:"Balanza de cocina digital",qty:"1 unidad"}],tip:"Conseguís todos estos materiales en IC Insumos Cosmética (Rocha 2177, Aguada, Montevideo) o en MercadoLibre Uruguay. El molde lo usás cientos de veces — es la única inversión que hacés una sola vez."},{tag:"Módulo 02",title:"Prepará tu espacio de trabajo",emoji:"🧹",desc:"Un espacio limpio y organizado es clave para que tus placas queden perfectas. Dedicá 10 minutos a prepararlo antes de empezar.",instructions:["Cubrí la mesada con papel de diario o papel film — la cera puede manchar y es difícil de quitar.","Colocá todos los materiales a mano antes de empezar: una vez que la cera esté derretida no podés alejarte.","Asegurate de tener buena ventilación — abrí una ventana. Las fragancias concentradas son fuertes.","Tené papel de cocina a mano para limpiar derrames rápido mientras la cera todavía está caliente.","Si vas a usar flores secas, separalas en un platito antes para tenerlas listas al momento de decorar."],tip:"La temperatura ambiente ideal para trabajar es entre 18°C y 25°C. Si hace mucho frío la cera solidifica más rápido y tenés menos tiempo para decorar.",warn:"Nunca derretás la cera en el microondas ni en ollas de aluminio. Usá siempre una jarra de acero inoxidable a baño maría o a fuego muy bajo."},{tag:"Módulo 03",title:"Derretí la cera correctamente",emoji:"🔥",desc:"Este es el paso más importante. La temperatura exacta determina si tu placa queda perfecta o se agrieta. <strong>El rango mágico es entre 70°C y 80°C.</strong>",instructions:["Pesá <strong>100g de cera de soja</strong> en la balanza para hacer 2 placas medianas.","Colocá la cera en la jarra y derretila a baño maría o a fuego mínimo, revolviendo suavemente.","Controlá con el termómetro: cuando llegue a <strong>75°C</strong> retirá del fuego.","Esperá a que baje a <strong>65°C</strong> antes de agregar la fragancia — si está muy caliente el aroma se evapora.","Agregá <strong>8-10g de fragancia</strong> (8-10% del peso de la cera) y revolvé suavemente 2 minutos."],tip:"La proporción correcta es 8-10g de fragancia por cada 100g de cera. Menos y no va a oler bien, más y la cera puede no solidificar.",warn:"¡No salpiques agua en la cera caliente! El agua y la cera caliente no se mezclan y pueden causar salpicaduras peligrosas. Asegurate que todo esté seco."},{tag:"Módulo 04",title:"Volcá la cera en el molde",emoji:"🫗",desc:"La técnica de volcado determina la superficie de tu placa. Hacelo despacio y con precisión para que quede perfectamente lisa.",instructions:["Revisá que el molde esté limpio, seco y sobre una superficie plana y nivelada.","Cuando la cera esté a <strong>60-65°C</strong> volcala lentamente al centro del molde, no desde el borde.","Dejá un pequeño espacio arriba (2-3mm) sin llenar para evitar derrames al enfriar.","Si el molde tiene orificio para el cordón, poné un palito de madera atravesado para que no se tape.","No muevas el molde por al menos <strong>30 minutos</strong> mientras la cera empieza a solidificar."],tip:"Si querés una placa con color, podés disolver 1-2 gotitas de colorante en polvo para velas en la cera antes de volcar. Los colores pasteles quedan muy elegantes."},{tag:"Módulo 05",title:"Decorá con flores secas",emoji:"🌸",desc:"Acá es donde tu placa cobra vida. La decoración floral hace que cada placa sea única y artesanal. <strong>Tenés una ventana de 5-10 minutos</strong> cuando la cera empieza a solidificarse pero todavía está tibia.",instructions:["Esperá a que la cera esté semi-sólida — al tocarla suavemente debe sentirse firme pero ligeramente tibia.","Con una pinza pequeña o los dedos, colocá las flores presionando suavemente para que queden incrustadas.","Empezá por las flores más grandes (rosas) y completá con las más chicas (lavanda, gypsophila).","Creá composiciones asimétricas — no pongas las flores perfectamente centradas, se ve más artesanal.","Si una flor no quedó bien, podés quitarla con la pinza y reposicionarla mientras la cera sigue tibia."],tip:"Los diseños más vendidos tienen un ramo de lavanda del lado izquierdo con 1-2 rosas en la parte inferior. Simple, elegante y que no falla.",warn:"No uses flores frescas ni húmedas — siempre tienen que estar completamente secas. La humedad hace que la cera no las agarre y pueden pudrirse con el tiempo."},{tag:"Módulo 06",title:"Tiempo de secado y desmolde",emoji:"⏰",desc:"La paciencia en este paso es fundamental. Una placa sacada antes de tiempo puede quebrarse o deformarse.",instructions:["Dejá la placa reposar <strong>a temperatura ambiente por 2-4 horas</strong> sin tocarla ni moverla.","Para acelerar podés meter el molde en la heladera por <strong>45-60 minutos</strong> — solidifica más rápido.","Para desmoldar, flexioná suavemente el molde de silicona por los bordes como una cubetera de hielo.","Si la placa no sale fácil, no la fuerces — volvela a la heladera 15 minutos más.","Una vez desmoldada, dejala reposar sobre superficie plana <strong>otras 12 horas</strong> para que cure."],tip:"El curado completo de la cera de soja toma 24-48 horas. Al día siguiente siempre huele más que recién hecha."},{tag:"Módulo 07",title:"Terminación, cordón y presentación",emoji:"🎀",desc:"El último paso convierte tu placa en un producto listo para regalar o vender. <strong>El packaging adecuado puede duplicar el precio de venta.</strong>",instructions:["Pasá el cordón de yute por el orificio superior y hacé un nudo o moño prolijo.","Revisá los bordes — si quedaron ásperos podés lijarlos suavemente con lija fina (240).","Para vender: colocá la placa en bolsa de celofán, cerrá con cinta de yute y agregá etiqueta kraft con el aroma.","Para regalar: envolvela en papel tissue, colocala en una cajita con relleno y sellá con cinta y sello de lacre dorado.","Almacená en lugar fresco, seco y sin sol directo — el aroma dura hasta 6 meses."],tip:"Agregá siempre una tarjetita con el nombre del aroma, cómo usarla y que fue hecha a mano. Eso justifica el precio y genera valor percibido."}];
var quiz=[{q:"¿A qué temperatura debés agregar la fragancia a la cera?",opts:["Cuando está a 90°C o más","Cuando bajó a 65°C","A temperatura ambiente","Antes de derretir la cera"],ok:1,fb:"¡Correcto! Agregás la fragancia cuando la cera baja a 65°C. Si está muy caliente el aroma se evapora y la placa no va a oler bien."},{q:"¿Cuánta fragancia debés usar por cada 100g de cera?",opts:["1-2g (1-2%)","20-25g (20-25%)","8-10g (8-10%)","50g (50%)"],ok:2,fb:"¡Exacto! La proporción correcta es 8-10g por cada 100g de cera. Más de eso puede hacer que la cera no solidifique bien."},{q:"¿Cuándo es el momento ideal para colocar las flores secas?",opts:["Inmediatamente después de volcar","Cuando está completamente sólida","Cuando está semi-sólida y tibia al tacto","Al día siguiente del desmolde"],ok:2,fb:"¡Muy bien! Las flores van cuando la cera está semi-sólida pero tibia — tenés una ventana de 5-10 minutos."},{q:"¿Qué tipo de cera se recomienda para placas aromáticas?",opts:["Cera de parafina de bajo punto","Cera de soja de alto punto de fusión (52-58°C)","Cualquier cera de vela","Cera de abeja solamente"],ok:1,fb:"¡Perfecto! La cera de soja de alto punto (52-58°C) es la ideal — queda firme y dura colgada."},{q:"¿Cuánto tiempo mínimo debe curar la placa antes de usarla?",opts:["15 minutos","2 horas","12-24 horas","Una semana"],ok:2,fb:"¡Correcto! El curado toma 12-24 horas. Durante ese tiempo el aroma también se intensifica."}];
var mode="steps",stepIdx=0,qIdx=0,score=0,answered=false;
function updateProgress(){var total=steps.length+quiz.length,done=0;if(mode==="steps")done=stepIdx;else if(mode==="quiz")done=steps.length+qIdx;else done=total;var pct=Math.round(done/total*100);document.getElementById("progFill").style.width=pct+"%";if(mode==="steps")document.getElementById("progCount").textContent="Paso "+(stepIdx+1)+" de "+steps.length;else if(mode==="quiz")document.getElementById("progCount").textContent="Quiz: "+(qIdx+1)+" de "+quiz.length;else document.getElementById("progCount").textContent="¡Completado! 🎉";var dotsEl=document.getElementById("dots");dotsEl.innerHTML="";for(var i=0;i<steps.length;i++){var d=document.createElement("div");d.className="dot"+(i===stepIdx&&mode==="steps"?" active":i<stepIdx||mode==="quiz"||mode==="final"?" done":"");d.textContent=i+1;(function(ii){d.onclick=function(){if(mode==="steps"){stepIdx=ii;renderStep();}};})(i);dotsEl.appendChild(d);}var qd=document.createElement("div");qd.className="dot"+(mode==="quiz"?" active":mode==="final"?" done":"");qd.textContent="Q";dotsEl.appendChild(qd);}
function renderStep(){var s=steps[stepIdx];var html='<div class="c-head"><div class="c-num">'+(stepIdx+1)+'</div><div><div class="c-tag">'+s.tag+'</div><div class="c-title">'+s.title+'</div></div></div><div class="c-body"><div class="illus">'+s.emoji+'</div><p class="desc">'+s.desc+'</p>';if(s.materials){html+='<div class="mat-box"><div class="box-title">✦ Lista de materiales</div>';for(var i=0;i<s.materials.length;i++){var m=s.materials[i];html+='<div class="mat-row"><span class="mat-icon">'+m.icon+'</span><span>'+m.name+'</span><span class="mat-qty">'+m.qty+'</span></div>';}html+='</div>';}if(s.instructions){html+='<div class="inst-box"><div class="box-title">✦ Instrucciones</div>';for(var j=0;j<s.instructions.length;j++){html+='<div class="inst-row"><div class="inst-n">'+(j+1)+'</div><div class="inst-t">'+s.instructions[j]+'</div></div>';}html+='</div>';}if(s.warn)html+='<div class="warn"><span class="warn-icon">⚠️</span><span>'+s.warn+'</span></div>';if(s.tip)html+='<div class="tip"><span class="tip-icon">💡</span><span>'+s.tip+'</span></div>';html+='</div><div class="nav">';if(stepIdx>0)html+='<button class="btn-back" id="btnBack">← Anterior</button>';var isLast=stepIdx===steps.length-1;html+='<button class="btn-next" id="btnNext">'+(isLast?'🎓 Ir al Quiz Final':'Siguiente →')+'</button></div>';var card=document.getElementById("card");card.innerHTML=html;card.style.animation="none";card.offsetHeight;card.style.animation="fadeUp .45s ease both";document.getElementById("btnNext").onclick=function(){if(isLast){mode="quiz";qIdx=0;score=0;renderQuiz();}else{stepIdx++;renderStep();}updateProgress();};if(stepIdx>0){document.getElementById("btnBack").onclick=function(){stepIdx--;renderStep();updateProgress();};}updateProgress();}
function renderQuiz(){if(qIdx>=quiz.length){mode="final";renderFinal();updateProgress();return;}var q=quiz[qIdx];var html='<div class="c-head"><div class="c-num">?</div><div><div class="c-tag">Quiz Final</div><div class="c-title">Ponemos a prueba lo que aprendiste</div></div></div><div class="qprog">Pregunta '+(qIdx+1)+' de '+quiz.length+'  ·  Puntaje: '+score+'/'+qIdx+'</div><p class="qtext">'+q.q+'</p><div class="qopts">';for(var i=0;i<q.opts.length;i++){html+='<button class="qopt" id="opt'+i+'">'+q.opts[i]+'</button>';}html+='</div><div class="qfb" id="qfb"></div><div class="nav" id="qnav" style="display:none"><button class="btn-next" id="btnQNext">'+(qIdx===quiz.length-1?'Ver mis resultados 🎉':'Siguiente pregunta →')+'</button></div>';var card=document.getElementById("card");card.innerHTML=html;card.style.animation="none";card.offsetHeight;card.style.animation="fadeUp .45s ease both";answered=false;for(var j=0;j<q.opts.length;j++){(function(idx){document.getElementById("opt"+idx).onclick=function(){if(answered)return;answered=true;var correct=quiz[qIdx].ok;for(var k=0;k<quiz[qIdx].opts.length;k++){document.getElementById("opt"+k).classList.add("disabled");}var fb=document.getElementById("qfb");if(idx===correct){document.getElementById("opt"+idx).classList.add("correct");score++;fb.className="qfb ok";fb.innerHTML="✅ "+quiz[qIdx].fb;}else{document.getElementById("opt"+idx).classList.add("wrong");document.getElementById("opt"+correct).classList.add("correct");fb.className="qfb ko";fb.innerHTML="❌ "+quiz[qIdx].fb;}document.getElementById("qnav").style.display="flex";document.getElementById("btnQNext").onclick=function(){qIdx++;if(qIdx>=quiz.length){mode="final";renderFinal();}else{renderQuiz();}updateProgress();};};})(j);}updateProgress();}
function renderFinal(){var pct=Math.round(score/quiz.length*100);var emoji,msg;if(pct===100){emoji="🌟";msg="¡Perfecta! Dominás el arte de las placas aromáticas. Estás lista para hacer tus primeras placas y empezar a vender.";}else if(pct>=80){emoji="🌸";msg="¡Muy bien! Tenés lo esencial claro. Con un poco de práctica vas a estar haciendo placas increíbles en poco tiempo.";}else if(pct>=60){emoji="🌿";msg="¡Buen intento! Te recomendamos repasar los módulos donde te equivocaste antes de hacer tu primera placa.";}else{emoji="💪";msg="Te recomendamos volver a repasar todos los módulos con calma. ¡Con práctica va a salir perfecto!";}var html='<div class="final"><span class="final-em">'+emoji+'</span><h2>¡Completaste la especialización!</h2><p>'+msg+'</p><div class="score">✦ Tu puntaje: '+score+' / '+quiz.length+' · '+pct+'%</div><br><p style="font-size:13px;color:var(--soft);margin-bottom:20px">Cuando hagas tu primera placa, envianos una foto a <strong style="color:var(--gold)">adm.nocheserena@hotmail.com</strong> para recibir tu <strong style="color:var(--gold)">Certificado Oficial con tu nombre 🎓</strong></p><button class="btn-restart" id="btnRestart">🔄 Repasar el curso</button></div>';var card=document.getElementById("card");card.innerHTML=html;card.style.animation="none";card.offsetHeight;card.style.animation="fadeUp .45s ease both";document.getElementById("btnRestart").onclick=function(){mode="steps";stepIdx=0;qIdx=0;score=0;renderStep();updateProgress();};}
renderStep();
</script>
</body>
</html>
